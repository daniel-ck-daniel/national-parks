<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Parks - Table View</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --positive: #3fb950;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 2rem;
}

.container {
  max-width: 1600px;
  margin: 0 auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}

h1 {
  font-size: 2rem;
  color: var(--text);
}

.view-toggle {
  padding: 0.5rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--accent);
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.2s;
}

.view-toggle:hover {
  border-color: var(--accent);
  background: var(--bg);
}

.subtitle {
  color: var(--text-muted);
  margin-bottom: 2rem;
  font-size: 0.95rem;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  text-align: center;
}

.stat-value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent);
}

.stat-label {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}

/* FILTERS */
.filters {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.filter-group label {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.filter-group select {
  padding: 0.5rem 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.9rem;
}

/* TABLE */
.table-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}

th {
  padding: 1rem;
  text-align: left;
  font-weight: 600;
  color: var(--accent);
  border-bottom: 2px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}

th:hover {
  background: rgba(88, 166, 255, 0.1);
}

th.sortable::after {
  content: ' ⇅';
  opacity: 0.3;
  font-size: 0.8rem;
}

th.sort-asc::after {
  content: ' ↑';
  opacity: 1;
}

th.sort-desc::after {
  content: ' ↓';
  opacity: 1;
}

td {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
}

tbody tr {
  cursor: pointer;
  transition: background 0.2s;
}

tbody tr:hover {
  background: rgba(88, 166, 255, 0.05);
}

.park-name-cell {
  font-weight: 600;
  color: var(--text);
}

.state-cell {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.distance-cell {
  color: var(--accent);
  font-size: 0.95rem;
}

.rating-cell {
  color: var(--positive);
  font-weight: 600;
}

.months-cell {
  font-size: 0.9rem;
}

.description-cell {
  max-width: 400px;
  color: var(--text-muted);
  font-size: 0.9rem;
  line-height: 1.4;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  z-index: 1000;
  overflow-y: auto;
  padding: 2rem;
}

.modal.active {
  display: flex;
  justify-content: center;
  align-items: start;
}

.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-width: 800px;
  width: 100%;
  padding: 2rem;
  position: relative;
  margin: 2rem 0;
}

.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  cursor: pointer;
  line-height: 1;
}

.modal-close:hover {
  color: var(--text);
}

.modal h2 {
  font-size: 1.8rem;
  margin-bottom: 0.5rem;
  color: var(--text);
}

.modal-meta {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.modal-meta-item {
  display: flex;
  flex-direction: column;
}

.modal-meta-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 0.25rem;
}

.modal-meta-value {
  font-size: 1rem;
  color: var(--text);
  font-weight: 600;
}

.modal-section {
  margin-bottom: 1.5rem;
}

.modal-section h3 {
  font-size: 1.2rem;
  color: var(--accent);
  margin-bottom: 0.75rem;
}

.modal-section p {
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 0.75rem;
}

.modal-section ul {
  list-style: none;
  padding: 0;
}

.modal-section li {
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.modal-section li:last-child {
  border-bottom: none;
}

.activity-tag {
  display: inline-block;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 0.25rem 0.75rem;
  border-radius: 4px;
  font-size: 0.85rem;
  margin-right: 0.5rem;
  margin-bottom: 0.5rem;
}

@media (max-width: 768px) {
  body {
    padding: 1rem;
  }
  
  h1 {
    font-size: 1.5rem;
  }
  
  th, td {
    padding: 0.75rem 0.5rem;
    font-size: 0.85rem;
  }
  
  .description-cell {
    max-width: 200px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>National Parks</h1>
    <a href="index.html" class="view-toggle">Switch to Card View</a>
  </div>
  <p class="subtitle">Lower 48 states — sortable table view</p>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Total Parks</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-visited">0</div>
      <div class="stat-label">Visited</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-within-6">0</div>
      <div class="stat-label">Within 6 Hours</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Season:</label>
      <select id="filter-season" onchange="renderTable()">
        <option value="all">All Seasons</option>
        <option value="spring">Spring</option>
        <option value="summer">Summer</option>
        <option value="fall">Fall</option>
        <option value="winter">Winter</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Activity:</label>
      <select id="filter-activity" onchange="renderTable()">
        <option value="all">All Types</option>
        <option value="chill">Chill/Scenic</option>
        <option value="moderate">Moderate Hiking</option>
        <option value="intense">Intense/Backpacking</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Min Rating:</label>
      <select id="filter-rating" onchange="renderTable()">
        <option value="0">Any</option>
        <option value="4.5">4.5+</option>
        <option value="4.6">4.6+</option>
        <option value="4.7">4.7+</option>
        <option value="4.8">4.8+</option>
      </select>
    </div>
  </div>

  <!-- Table -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="sortable" onclick="sortTable('name')">Park</th>
          <th class="sortable" onclick="sortTable('state')">State</th>
          <th class="sortable" onclick="sortTable('driveHours')">Distance</th>
          <th class="sortable" onclick="sortTable('rating')">Rating</th>
          <th class="sortable" onclick="sortTable('bestMonths')">Best Months</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="table-body">
      </tbody>
    </table>
  </div>
</div>

<!-- Detail Modal -->
<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="parks-data.js"></script>
<script>
let sortColumn = 'driveHours';
let sortDirection = 'asc';

function sortTable(column) {
  if (sortColumn === column) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = column;
    sortDirection = 'asc';
  }
  renderTable();
}

function matchesSeason(bestMonths, season) {
  if (season === 'all') return true;
  
  const months = bestMonths.toLowerCase();
  const seasonMonths = {
    spring: ['march', 'april', 'may'],
    summer: ['june', 'july', 'august'],
    fall: ['september', 'october', 'november'],
    winter: ['december', 'january', 'february']
  };
  
  return seasonMonths[season].some(month => months.includes(month));
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const seasonFilter = document.getElementById('filter-season').value;
  const activityFilter = document.getElementById('filter-activity').value;
  const ratingFilter = parseFloat(document.getElementById('filter-rating').value);
  
  // Filter
  let filtered = parks.filter(park => {
    if (!matchesSeason(park.bestMonths, seasonFilter)) return false;
    if (activityFilter !== 'all' && park.activityLevel !== activityFilter) return false;
    if (park.rating < ratingFilter) return false;
    return true;
  });
  
  // Sort
  filtered.sort((a, b) => {
    let valA = a[sortColumn];
    let valB = b[sortColumn];
    
    if (typeof valA === 'string') {
      valA = valA.toLowerCase();
      valB = valB.toLowerCase();
    }
    
    if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
    if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
  
  // Update sort indicators
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
  });
  const activeHeader = Array.from(document.querySelectorAll('th')).find(th => {
    return th.textContent.toLowerCase().includes(sortColumn.toLowerCase()) ||
           (sortColumn === 'driveHours' && th.textContent === 'Distance') ||
           (sortColumn === 'bestMonths' && th.textContent === 'Best Months');
  });
  if (activeHeader) {
    activeHeader.classList.add(sortDirection === 'asc' ? 'sort-asc' : 'sort-desc');
  }
  
  // Render rows
  tbody.innerHTML = filtered.map(park => `
    <tr onclick="showDetail('${park.id}')">
      <td class="park-name-cell">${park.name}</td>
      <td class="state-cell">${park.state}</td>
      <td class="distance-cell">${park.driveHours}h (${park.driveMiles} mi)</td>
      <td class="rating-cell">★ ${park.rating}</td>
      <td class="months-cell">${park.bestMonths}</td>
      <td class="description-cell">${park.shortDescription}</td>
    </tr>
  `).join('');
  
  updateStats();
}

function updateStats() {
  document.getElementById('stat-total').textContent = parks.length;
  document.getElementById('stat-visited').textContent = parks.filter(p => p.visited).length;
  document.getElementById('stat-within-6').textContent = parks.filter(p => p.driveHours <= 6).length;
}

function showDetail(parkId) {
  const park = parks.find(p => p.id === parkId);
  if (!park) return;
  
  const modal = document.getElementById('modal');
  const body = document.getElementById('modal-body');
  
  body.innerHTML = `
    <h2>${park.name}</h2>
    <div class="modal-meta">
      <div class="modal-meta-item">
        <div class="modal-meta-label">Location</div>
        <div class="modal-meta-value">${park.state}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Distance</div>
        <div class="modal-meta-value">${park.driveHours}h (${park.driveMiles} mi)</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Rating</div>
        <div class="modal-meta-value">★ ${park.rating}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Best Months</div>
        <div class="modal-meta-value">${park.bestMonths}</div>
      </div>
    </div>
    
    <div class="modal-section">
      <h3>About</h3>
      <p>${park.fullDescription}</p>
    </div>
    
    <div class="modal-section">
      <h3>Activities</h3>
      <div>
        ${park.activities.map(a => `<span class="activity-tag">${a}</span>`).join('')}
      </div>
      <p style="margin-top: 1rem;"><strong>Intensity:</strong> ${park.activityLevel.charAt(0).toUpperCase() + park.activityLevel.slice(1)}</p>
    </div>
    
    <div class="modal-section">
      <h3>4-Day Trip Itinerary</h3>
      ${park.itinerary.map((day, i) => `
        <p><strong>Day ${i + 1}:</strong> ${day}</p>
      `).join('')}
    </div>
    
    <div class="modal-section">
      <h3>Essential Gear</h3>
      <ul>
        ${park.gear.map(item => `<li>${item}</li>`).join('')}
      </ul>
    </div>
  `;
  
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  const modal = document.getElementById('modal');
  modal.classList.remove('active');
  document.body.style.overflow = 'auto';
}

// Initial render
renderTable();
</script>

</body>
</html>
